name: Unit Test

on:
    push:
        branches:
            - master
    pull_request:
        types:
            - opened
            - synchronize
            - reopened
            - ready_for_review
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    frontend:
        name: Vitest
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - uses: actions/setup-node@v5
              with:
                  node-version: 24.x
                  cache: npm
            - run: npm ci
            - run: npm run test

    rust-windows:
        name: Rust Backend (Windows)
        runs-on: windows-latest
        defaults:
            run:
                shell: bash
        steps:
            - uses: actions/checkout@v5
            - uses: dtolnay/rust-toolchain@stable
            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: . -> target
            - run: cargo test --workspace --exclude vrcx-0 --locked

    rust-linux:
        name: Rust Backend (Linux)
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@v5
            - name: Install Linux dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y --no-install-recommends \
                      clang \
                      cmake \
                      g++ \
                      libclang-dev \
                      libwebkit2gtk-4.1-dev \
                      libgtk-3-dev \
                      libayatana-appindicator3-dev \
                      librsvg2-dev
            - uses: dtolnay/rust-toolchain@stable
            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: . -> target
            - run: cargo test --workspace --exclude vrcx-0 --locked

    rust-macos:
        name: Rust Backend (macOS)
        runs-on: macos-latest
        defaults:
            run:
                shell: bash
        steps:
            - uses: actions/checkout@v5
            - uses: dtolnay/rust-toolchain@stable
            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: . -> target
            - run: cargo test --workspace --exclude vrcx-0 --locked
