name: Package Linux DevTools

on:
    workflow_dispatch:

concurrency:
    group: ${{ github.ref }}-package-linux-devtools
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    package:
        name: Linux DevTools AppImage
        runs-on: ubuntu-24.04
        defaults:
            run:
                shell: bash
        steps:
            - uses: actions/checkout@v6

            - uses: dtolnay/rust-toolchain@stable

            - uses: actions/setup-node@v6
              with:
                  node-version: 24.x
                  cache: npm

            - name: Install Linux dependencies
              run: |
                  webkitgtk_version="2.44.0-2"

                  sudo apt-get update
                  sudo apt-get install -y --no-install-recommends \
                      build-essential \
                      curl \
                      file \
                      libayatana-appindicator3-dev \
                      libssl-dev \
                      libxdo-dev \
                      librsvg2-dev \
                      patchelf \
                      rpm \
                      wget
                  sudo apt-get install -y --no-install-recommends \
                      libgtk-3-dev \
                      libwebkit2gtk-4.1-0="$webkitgtk_version" \
                      libwebkit2gtk-4.1-dev="$webkitgtk_version" \
                      libjavascriptcoregtk-4.1-0="$webkitgtk_version" \
                      libjavascriptcoregtk-4.1-dev="$webkitgtk_version" \
                      gir1.2-javascriptcoregtk-4.1="$webkitgtk_version" \
                      gir1.2-webkit2-4.1="$webkitgtk_version"

            - run: npm ci

            - name: Prepare fixed AppImage DevTools config
              run: |
                  node <<'NODE'
                  const fs = require('node:fs');

                  const version = '0.1.0';
                  const linuxConfigPath = 'src-tauri/tauri.linux.conf.json';
                  const outputConfigPath = 'src-tauri/tauri.linux-devtools.conf.json';
                  const cargoTomlPath = 'src-tauri/Cargo.toml';
                  const cargoLockPath = 'Cargo.lock';

                  const linuxConfig = JSON.parse(fs.readFileSync(linuxConfigPath, 'utf8'));
                  const config = {
                      version,
                      bundle: {
                          ...(linuxConfig.bundle ?? {}),
                          targets: ['appimage'],
                          createUpdaterArtifacts: false
                      }
                  };

                  fs.writeFileSync(outputConfigPath, `${JSON.stringify(config, null, 4)}\n`);

                  const cargoToml = fs.readFileSync(cargoTomlPath, 'utf8');
                  const cargoVersionPattern = /(^\[package\][\s\S]*?^version\s*=\s*)"[^"]+"/m;
                  if (!cargoVersionPattern.test(cargoToml)) {
                      throw new Error('Failed to update src-tauri/Cargo.toml package version');
                  }
                  fs.writeFileSync(cargoTomlPath, cargoToml.replace(cargoVersionPattern, `$1"${version}"`));

                  const cargoLock = fs.readFileSync(cargoLockPath, 'utf8');
                  const lockVersionPattern = /(\[\[package\]\]\r?\nname = "vrcx-0"\r?\nversion = )"[^"]+"/;
                  if (!lockVersionPattern.test(cargoLock)) {
                      throw new Error('Failed to update Cargo.lock package version');
                  }
                  fs.writeFileSync(cargoLockPath, cargoLock.replace(lockVersionPattern, `$1"${version}"`));
                  NODE

            - name: Build Linux DevTools AppImage
              run: |
                  npm run tauri:build:devtools -- \
                      --config src-tauri/tauri.linux-devtools.conf.json \
                      --bundles appimage

            - name: List AppImage output
              run: find target/release/bundle/appimage -maxdepth 1 -type f | sort

            - uses: actions/upload-artifact@v7
              with:
                  name: linux-appimage-devtools-0.1.0
                  path: target/release/bundle/appimage/*.AppImage
                  if-no-files-found: error
