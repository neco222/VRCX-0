name: Package Preview

on:
    workflow_dispatch:

concurrency:
    group: ${{ github.ref }}-package-preview
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    prepare:
        name: Prepare preview metadata
        runs-on: ubuntu-24.04
        outputs:
            timestamp: ${{ steps.timestamp.outputs.timestamp }}
        steps:
            - id: timestamp
              name: Generate preview timestamp
              run: |
                  node <<'NODE'
                  const fs = require('node:fs');

                  const timestampParts = new Intl.DateTimeFormat('en-US', {
                      timeZone: 'Asia/Tokyo',
                      year: 'numeric',
                      month: '2-digit',
                      day: '2-digit',
                      hour: '2-digit',
                      minute: '2-digit',
                      hourCycle: 'h23'
                  })
                      .formatToParts(new Date())
                      .reduce((parts, part) => {
                          parts[part.type] = part.value;
                          return parts;
                      }, {});
                  const previewTimestamp = `${timestampParts.year}${timestampParts.month}${timestampParts.day}-${timestampParts.hour}${timestampParts.minute}`;

                  fs.appendFileSync(process.env.GITHUB_OUTPUT, `timestamp=${previewTimestamp}\n`);
                  NODE

    package:
        name: Preview ${{ matrix.platform }}
        needs: prepare
        runs-on: ${{ matrix.os }}
        defaults:
            run:
                shell: bash
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: windows_x86_64
                      os: windows-latest
                      output: VRCX-0_${version}_preview_${timestamp}_windows_x86_64.exe
                    - platform: linux_x86_64
                      os: ubuntu-24.04
                      output: VRCX-0_${version}_preview_${timestamp}_linux_x86_64.AppImage
        steps:
            - uses: actions/checkout@v6

            - uses: dtolnay/rust-toolchain@stable

            - uses: actions/setup-node@v6
              with:
                  node-version: 24.x
                  cache: npm

            - name: Install Linux dependencies
              if: runner.os == 'Linux'
              run: |
                  webkitgtk_version="2.44.0-2"

                  sudo apt-get update
                  sudo apt-get install -y --no-install-recommends \
                      build-essential \
                      clang \
                      cmake \
                      curl \
                      file \
                      g++ \
                      libayatana-appindicator3-dev \
                      libclang-dev \
                      libssl-dev \
                      libxdo-dev \
                      librsvg2-dev \
                      patchelf \
                      rpm \
                      wget
                  sudo apt-get install -y --no-install-recommends \
                      libgtk-3-dev \
                      libwebkit2gtk-4.1-0="$webkitgtk_version" \
                      libwebkit2gtk-4.1-dev="$webkitgtk_version" \
                      libjavascriptcoregtk-4.1-0="$webkitgtk_version" \
                      libjavascriptcoregtk-4.1-dev="$webkitgtk_version" \
                      gir1.2-javascriptcoregtk-4.1="$webkitgtk_version" \
                      gir1.2-webkit2-4.1="$webkitgtk_version"

            - run: npm ci

            - id: config
              name: Prepare Preview config
              run: |
                  node <<'NODE'
                  const fs = require('node:fs');

                  const tauriConfigPath = 'src-tauri/tauri.conf.json';
                  const linuxConfigPath = 'src-tauri/tauri.linux.conf.json';
                  const outputConfigPath = process.env.RUNNER_OS === 'Linux'
                      ? 'src-tauri/tauri.linux-preview.conf.json'
                      : 'src-tauri/tauri.windows-preview.conf.json';

                  const tauriConfig = JSON.parse(fs.readFileSync(tauriConfigPath, 'utf8'));
                  let config = tauriConfig;

                  if (process.env.RUNNER_OS === 'Linux') {
                      const linuxConfig = JSON.parse(fs.readFileSync(linuxConfigPath, 'utf8'));
                      config = {
                          bundle: {
                              ...(linuxConfig.bundle ?? {}),
                              targets: ['appimage'],
                              createUpdaterArtifacts: false
                          }
                      };
                  } else {
                      config = structuredClone(tauriConfig);
                      config.bundle ??= {};
                      config.bundle.createUpdaterArtifacts = false;
                      config.bundle.windows ??= {};
                      delete config.bundle.windows.certificateThumbprint;
                      delete config.bundle.windows.signCommand;
                  }

                  fs.writeFileSync(outputConfigPath, `${JSON.stringify(config, null, 4)}\n`);
                  fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${tauriConfig.version}\n`);
                  fs.appendFileSync(process.env.GITHUB_OUTPUT, `config=${outputConfigPath}\n`);
                  NODE

            - name: Build Windows Preview exe
              if: runner.os == 'Windows'
              env:
                  VRCX-0_BUILD_LABEL: preview
                  VRCX-0_BUILD_BADGE: Preview ${{ needs.prepare.outputs.timestamp }}
              run: |
                  npm run tauri:build:devtools -- \
                      --debug \
                      --config "${{ steps.config.outputs.config }}" \
                      --no-sign \
                      --no-bundle

            - name: Build Linux Preview AppImage
              if: runner.os == 'Linux'
              env:
                  VRCX-0_BUILD_LABEL: preview
                  VRCX-0_BUILD_BADGE: Preview ${{ needs.prepare.outputs.timestamp }}
              run: |
                  npm run tauri:build:devtools -- \
                      --config "${{ steps.config.outputs.config }}" \
                      --bundles appimage

            - name: Collect Preview artifact
              run: |
                  mkdir -p preview-assets
                  version="${{ steps.config.outputs.version }}"
                  timestamp="${{ needs.prepare.outputs.timestamp }}"
                  output="${{ matrix.output }}"
                  output="${output//\$\{version\}/$version}"
                  output="${output//\$\{timestamp\}/$timestamp}"

                  if [[ "${{ runner.os }}" == "Windows" ]]; then
                      cp target/debug/vrcx-0.exe "preview-assets/$output"
                  else
                      cp target/release/bundle/appimage/*.AppImage "preview-assets/$output"
                  fi

                  ls -la preview-assets

            - uses: actions/upload-artifact@v7
              with:
                  name: preview-${{ matrix.platform }}-${{ steps.config.outputs.version }}-${{ needs.prepare.outputs.timestamp }}
                  path: preview-assets/*
                  if-no-files-found: error
